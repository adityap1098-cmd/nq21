<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0A0908" rx="0"/>
  <!-- Red accent strip top-right -->
  <rect x="380" y="0" width="132" height="8" fill="#C8102E"/>
  <!-- Letter N — geometric, bold, Anton-style -->
  <text
    x="256"
    y="330"
    text-anchor="middle"
    font-family="Anton, 'Arial Black', sans-serif"
    font-size="300"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-8"
  >N</text>
  <!-- Bottom red accent bar -->
  <rect x="0" y="460" width="512" height="52" fill="#C8102E"/>
  <!-- Tagline in accent area -->
  <text
    x="256"
    y="496"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="22"
    font-weight="700"
    fill="rgba(255,255,255,0.85)"
    letter-spacing="6"
  >PERFORMANCE</text>
</svg>
